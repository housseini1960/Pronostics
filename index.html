    <script>
        // Base de données masquée contenant les vrais résultats pronostics du site
        const secureDatabase = {
            1: "Score Exact : 3 - 1",
            2: "Score Exact : 1 - 0",
            3: "Score Exact : 2 - 0"
        };

        // Liste complète et sécurisée de tes 50 codes VIP uniques
        const SECURE_VIP_CODES = [
            "housseini1960-k2m7x", "housseini1960-p8v3l", "housseini1960-w4m9b", "housseini1960-j9z4t",
            "housseini1960-q1n6f", "housseini1960-h5k2r", "housseini1960-c8m4w", "housseini1960-p7x1v",
            "housseini1960-g6n3q", "housseini1960-t9z2j", "housseini1960-k4m8x", "housseini1960-p2v6l",
            "housseini1960-w1m7b", "housseini1960-j5z9t", "housseini1960-q8n4f", "housseini1960-a3r7k",
            "housseini1960-d9w2m", "housseini1960-l8p4v", "housseini1960-f5g3q", "housseini1960-t1m9b",
            "housseini1960-v3b2n", "housseini1960-x7c8v", "housseini1960-m1k2l", "housseini1960-p4p5p",
            "housseini1960-z9z9z", "housseini1960-y1y1y", "housseini1960-r2r2r", "housseini1960-t3t3t",
            "housseini1960-q4q4q", "housseini1960-s5s5s", "housseini1960-d6d6d", "housseini1960-f7f7f",
            "housseini1960-g8g8g", "housseini1960-h9h9h", "housseini1960-j0j0j", "housseini1960-k1k1k",
            "housseini1960-l2l2l", "housseini1960-m3m3m", "housseini1960-n4n4n", "housseini1960-p5p5p",
            "housseini1960-q6q6q", "housseini1960-r7r7r", "housseini1960-s8s8s", "housseini1960-t9t9t",
            "housseini1960-u0u0u", "housseini1960-v1v1v", "housseini1960-w2w2w", "housseini1960-x3x3x",
            "housseini1960-y4y4y", "housseini1960-z5z5z"
        ];

        // Générateur d'empreinte digitale pour bloquer le partage de code
        function generateDeviceFingerprint() {
            return btoa(navigator.userAgent + (navigator.hardwareConcurrency || 2) + (navigator.deviceMemory || 4));
        }
        // Cette fonction n'ouvre QUE le match précis qui a été validé
        function applySpecificUnlock(matchNum) {
            if (document.getElementById("p" + matchNum)) {
                document.getElementById("p" + matchNum).innerText = secureDatabase[matchNum];
                document.getElementById("p" + matchNum).style.filter = "none";
                document.getElementById("l" + matchNum).style.display = "none";
                if (document.getElementById("inputZone" + matchNum)) {
                    document.getElementById("inputZone" + matchNum).style.display = "none";
                }
                localStorage.setItem("match_active_" + matchNum, "true");
            }
        }

        // Moteur de vérification connecté à Firebase (Match par Match)
        function checkSecureMatchCode(matchNum) {
            try {
                const inputField = document.getElementById("key" + matchNum);
                if (!inputField) return;
                
                const userInput = inputField.value.trim();
                
                if (userInput === "hackot123") {
                    localStorage.clear();
                    alert("🛠️ Mode Admin : Sécurité réinitialisée match par match !");
                    window.location.reload();
                    return;
                }

                if (!SECURE_VIP_CODES.includes(userInput)) {
                    alert("❌ Ce code d'accès n'existe pas ou est falsifié !");
                    return;
                }

                if (!database) {
                    alert("❌ Le système de sécurité en ligne est déconnecté. Vérifie ton accès Internet.");
                    return;
                }

                const myDeviceFingerprint = generateDeviceFingerprint();

                database.ref('codes/' + userInput).once('value').then((snapshot) => {
                    const registeredDevice = snapshot.val();

                    if (registeredDevice && registeredDevice !== myDeviceFingerprint) {
                        alert("❌ Ce code est déjà utilisé sur un autre téléphone !");
                    } else {
                        database.ref('codes/' + userInput).set(myDeviceFingerprint).then(() => {
                            applySpecificUnlock(matchNum);
                            alert("✅ Félicitations ! Ton accès pour ce ticket VIP est activé.");
                        });
                    }
                }).catch((error) => {
                    alert("❌ Erreur de base de données : " + error.message);
                });

            } catch (error) {
                alert("⚠️ Erreur : " + error.message);
            }
        }

        // Vérification automatique au chargement de la page pour laisser ouvert si déjà débloqué
        document.addEventListener("DOMContentLoaded", () => {
            for (let i = 1; i <= 3; i++) {
                if (localStorage.getItem("match_active_" + i) === "true") {
                    applySpecificUnlock(i);
                }
            }
        });
    </script>
